name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to publish (must already be set in package.json on main)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Verify package.json version matches input
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$PKG_VER" != "${{ github.event.inputs.version }}" ]; then
            echo "package.json version ($PKG_VER) does not match input (${{ github.event.inputs.version }})"
            exit 1
          fi

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
